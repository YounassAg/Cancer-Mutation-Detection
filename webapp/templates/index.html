<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancer Mutation Classification</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- Header -->
    <header class="site-header">
        <div class="header-icon">
            <!-- DNA-like SVG Icon -->
            <svg viewBox="0 0 24 24">
                <path d="M4 4h16M4 20h16M5 4c0 4 3 6 7 8s7 4 7 8M19 4c0 4-3 6-7 8s-7 4-7 8"/>
                <path d="M9 7h6M7 11h10M7 17h10"/>
            </svg>
        </div>
        <div class="header-text">
            <h1>Cancer Mutation Classification</h1>
            <p>Clinical Inference & Interpretation Tool</p>
        </div>
    </header>

    <main class="main-container">
        
        <!-- Left Panel: Input Form -->
        <div class="input-panel">
            <div class="card">
                <h2 class="card-title">
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><path d="m9 16 3-3 3 3"/></svg>
                    Variant Input
                </h2>
                
                <div class="examples-section">
                    <div class="examples-label">Quick Test Examples</div>
                    <div class="chip-row" id="chip-row">
                        <!-- Chips injected by JS -->
                    </div>
                </div>

                <div id="error-banner" class="error-banner"></div>

                <form id="prediction-form">
                    <div class="form-grid">
                        
                        <div class="form-group">
                            <label for="gene_symbol">Gene Symbol</label>
                            <input type="text" id="gene_symbol" placeholder="e.g. KRAS" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="gene_id">Gene ID</label>
                            <input type="number" id="gene_id" placeholder="e.g. 3845" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="ref_allele">Ref Allele</label>
                            <input type="text" id="ref_allele" placeholder="e.g. C" required maxlength="50">
                        </div>
                        
                        <div class="form-group">
                            <label for="alt_allele">Alt Allele</label>
                            <input type="text" id="alt_allele" placeholder="e.g. T" required maxlength="50">
                        </div>

                        <div class="form-group full-width">
                            <label for="position">Position (VCF)</label>
                            <input type="number" id="position" placeholder="e.g. 25245350" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="chromosome">Chromosome</label>
                            <select id="chromosome" required>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                                <option value="11">11</option>
                                <option value="12" selected>12</option>
                                <option value="13">13</option>
                                <option value="14">14</option>
                                <option value="15">15</option>
                                <option value="16">16</option>
                                <option value="17">17</option>
                                <option value="18">18</option>
                                <option value="19">19</option>
                                <option value="20">20</option>
                                <option value="21">21</option>
                                <option value="22">22</option>
                                <option value="X">X</option>
                                <option value="Y">Y</option>
                                <option value="MT">MT</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="var_type">Variant Type</label>
                            <select id="var_type" required>
                                <option value="snp" selected>SNP</option>
                                <option value="deletion">Deletion</option>
                                <option value="insertion">Insertion</option>
                                <option value="indel">Indel</option>
                                <option value="duplication">Duplication</option>
                            </select>
                        </div>
                        
                        <div class="form-group full-width">
                            <label for="origin">Origin</label>
                            <select id="origin" required>
                                <option value="somatic" selected>Somatic (Tumor-acquired)</option>
                                <option value="germline">Germline (Inherited)</option>
                                <option value="unknown">Unknown</option>
                            </select>
                        </div>
                    </div>
                    
                    <button type="submit" id="btn-predict" class="btn-predict">
                        <span class="btn-label">Run Clinical Inference</span>
                        <div class="spinner"></div>
                    </button>
                </form>
            </div>
        </div>

        <!-- Right Panel: Results -->
        <div class="results-panel">
            <div class="card results-card" id="results-card">
                <h2 class="card-title">
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="m9 15 2 2 4-4"/></svg>
                    Clinical Report
                </h2>
                
                <div id="result-empty" class="result-empty">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    <p>Enter a variant or select an example to view the clinical report.</p>
                </div>
                
                <div id="results-content" style="display: none;">
                    <!-- Injected by JS -->
                </div>
            </div>
        </div>

    </main>

    <footer class="site-footer">
        Deep Learning Project • Cancer Mutation Detection
    </footer>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
